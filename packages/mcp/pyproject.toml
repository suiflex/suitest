[project]
name = "suitest-mcp"
version = "0.4.0"
description = "Suitest MCP layer — generic client, registry, connection pool, routing, health"
requires-python = ">=3.12,<3.13"
dependencies = [
  "mcp>=1.0.0",
  "httpx>=0.27",
  "websockets>=12",
  "pydantic>=2.7",
  "structlog>=24.1",
  "opentelemetry-api>=1.25",
  "opentelemetry-sdk>=1.25",
  "anyio>=4.3",
  "redis[hiredis]>=5.0",
  "psycopg[binary]>=3.2",
  "psycopg-pool>=3.2",
  "jsonpath-ng>=1.6",
  "suitest-shared",
  "suitest-db",
  "suitest-core",
]

[project.optional-dependencies]
test = [
  "pytest>=8.2",
  "pytest-asyncio>=0.23",
  "pytest-mock>=3.14",
  "respx>=0.21",
  "testcontainers[postgres,redis,minio]>=4.5",
]

[build-system]
requires = ["hatchling>=1.31.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/suitest_mcp"]

[tool.pytest.ini_options]
asyncio_mode = "strict"
