# Suitest DB Alembic config.
# Most settings live in env.py; this file pins file locations + logging.

[alembic]
script_location = alembic
prepend_sys_path = . src
path_separator = os
timezone = UTC
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# sqlalchemy.url is intentionally left blank — env.py reads SUITEST_DATABASE_URL
# from DbSettings (pydantic-settings) so we never duplicate config.
sqlalchemy.url =

[post_write_hooks]
hooks = ruff_format
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
