[project]
name = "suitest-core"
version = "0.1.0"
description = "Suitest shared domain logic — capability resolver, autonomy, crypto"
requires-python = ">=3.12,<3.13"
dependencies = [
  "pydantic>=2.9.0",
  "cryptography>=42",
  "sqlalchemy>=2.0.36",
]

# M4-2: local semantic-search embeddings. Optional + heavy (ONNX runtime + model
# download) so it ships as an extra — `uv sync --extra embeddings`. Without it,
# SUITEST_EMBEDDINGS must stay unset/none (search degrades to lexical).
[project.optional-dependencies]
embeddings = ["fastembed>=0.3.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/suitest_core"]
