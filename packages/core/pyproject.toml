[project]
name = "suitest-core"
version = "0.1.0"
description = "Suitest shared domain logic — capability resolver, autonomy, crypto"
requires-python = ">=3.12,<3.13"
dependencies = [
  "pydantic>=2.9.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/suitest_core"]
