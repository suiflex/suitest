[project]
name = "suitest-agent"
version = "0.1.0"
description = "Suitest AI agent layer — LiteLLM + LangGraph (stub for M0; full impl in M3)"
requires-python = ">=3.12,<3.13"
dependencies = [
    # Intra-workspace: classifier + future generators consume the shared
    # generator_input schemas (TargetKind, ClassificationResult, ...).
    "suitest-shared",
    # M2 Task 2 — deterministic OpenAPI generator: parse specs, validate
    # response schemas, and synthesise example request bodies (ZERO tier, no LLM).
    "openapi-pydantic>=0.4.0",
    "jsonschema>=4.21",
    "faker>=25.0",
    "httpx>=0.27",
    "pyyaml>=6.0",
    # M3-1 — LiteLLM router (100+ providers via one client). Imported lazily inside
    # providers/litellm_router.py so ZERO tier + tests never load it at import time.
    "litellm>=1.51",
    # M3-4 — LangGraph state machines for the 4 agent modes. Lazy-imported in graphs/.
    "langgraph>=0.2.40",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/suitest_agent"]
