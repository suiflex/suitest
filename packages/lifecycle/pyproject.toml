[project]
name = "suiflex-suitest-lifecycle"
version = "0.1.4"
description = "Suitest testing lifecycle ‚Äî TestSprite-parity analyze‚Üígenerate‚Üístart‚Üíwait‚Üírun‚Üíreport"
requires-python = ">=3.11"
# No third-party runtime deps: the lifecycle core is stdlib-only so it can drive
# any target project. Generated tests use `requests` / `playwright`, installed in
# the target's own environment ‚Äî not here.
dependencies = []

# Frontend execution runtime. Suitest BUNDLES the browser driver so the user
# never installs playwright themselves (it provisions Chromium on first run).
# Install with: pip install "suiflex-suitest-lifecycle[frontend]"
[project.optional-dependencies]
frontend = ["playwright>=1.40"]
# NOTE: publishing run results back to a Suitest instance needs `suiflex-suitest-sdk`.
# It is a LOCAL path package (not on PyPI), so it is NOT listed here as a version
# dep ‚Äî that would break `uv` workspace resolution. Install it into the same env
# with:  uv pip install --python .venv/bin/python -e sdk/python
# Without it, publish degrades to a no-op ("suiflex-suitest-sdk not installed").

[project.scripts]
suitest = "suitest_lifecycle.cli:main"
# MCP stdio server ‚Äî `uvx --from suiflex-suitest-lifecycle suitest-mcp` (or the npm
# wrapper: `npx -y @suiflex/suitest-mcp`).
suitest-mcp = "suitest_lifecycle.mcp_server:serve"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/suitest_lifecycle"]
