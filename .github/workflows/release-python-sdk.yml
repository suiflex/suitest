name: release-python-sdk

# M4-5 / M4-7: build + publish suiflex-suitest-sdk and suiflex-suitest-cli to PyPI on a
# `pysdk-v*` tag. Uses PyPI Trusted Publishing (OIDC) — no API token stored;
# configure the publisher in the PyPI project settings. Until that is set up,
# the build job still runs on PRs (validates the wheels) but does not publish.
#
# PyPI rejects two *pending* trusted publishers with an identical
# (owner, repo, workflow, environment) tuple, so each package publishes from
# its own job with a distinct GitHub environment:
#   suiflex-suitest-sdk → environment `pypi`
#   suiflex-suitest-cli → environment `pypi-cli`

on:
  push:
    tags: ["pysdk-v*"]
  pull_request:
    paths:
      - "sdk/python/**"
      - "cli/**"
      - ".github/workflows/release-python-sdk.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - package: "sdk/python"
            artifact: "dist-sdk"
          - package: "cli"
            artifact: "dist-cli"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade build twine
          python -m build "${{ matrix.package }}" --outdir dist
      - name: Validate distribution metadata (publish dry-run)
        # Proves the wheel + sdist would be accepted by PyPI before any
        # credential exists — catches bad metadata/README rendering at PR time.
        run: python -m twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  publish-sdk:
    needs: build
    if: startsWith(github.ref, 'refs/tags/pysdk-v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist-sdk
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  publish-cli:
    needs: build
    if: startsWith(github.ref, 'refs/tags/pysdk-v')
    runs-on: ubuntu-latest
    environment: pypi-cli
    permissions:
      id-token: write # OIDC for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist-cli
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
