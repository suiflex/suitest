name: release-mcp

# Publish the MCP server packages on a `mcp-v*` tag:
#   - @suiflex/suitest-mcp        → npm  (npx -y @suiflex/suitest-mcp)
#   - suiflex-suitest-lifecycle   → PyPI (uvx --from suiflex-suitest-lifecycle suitest-mcp)
#
# npm uses OIDC Trusted Publishing; no long-lived NPM_TOKEN is required. PyPI
# still uses PYPI_TOKEN. On PRs, the build + smoke + dry-run steps validate.

on:
  push:
    tags: ["mcp-v*"]
  pull_request:
    paths:
      - "packages/mcp-npx/**"
      - "packages/lifecycle/**"
      - ".github/workflows/release-mcp.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing mcp release tag to publish to npm
        required: true
        type: string

permissions:
  contents: read

jobs:
  npm:
    name: "@suiflex/suitest-mcp → npm"
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mcp-npx
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22" # node --test glob patterns need >= 21
          registry-url: "https://registry.npmjs.org"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Smoke test (bundle sync + MCP boot)
        run: npm test

      - name: Validate package contents (publish dry-run)
        run: |
          npm pack --dry-run
          npm publish --dry-run --access public

  publish-npm:
    name: "@suiflex/suitest-mcp → npm"
    if: github.event_name == 'push'
    needs: [npm]
    runs-on: ubuntu-latest
    # OIDC Trusted Publishing: npm trusts this repository, workflow, and the
    # `release` environment, so GitHub mints a short-lived token per publish.
    environment: release
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: packages/mcp-npx
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@11.5.2
      - name: Tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#mcp-v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          [ "$TAG_VERSION" = "$PKG_VERSION" ] || {
            echo "tag $GITHUB_REF_NAME != package.json $PKG_VERSION" >&2; exit 1; }
      - name: Publish to npm
        run: npm publish --access public

  recover-npm:
    name: "Recover @suiflex/suitest-mcp npm publish"
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: packages/mcp-npx
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@11.5.2
      - name: Tag matches package version
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          TAG_VERSION="${RELEASE_TAG#mcp-v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          [ "$TAG_VERSION" = "$PKG_VERSION" ] || {
            echo "tag $RELEASE_TAG != package.json $PKG_VERSION" >&2; exit 1; }
      - name: Publish to npm
        run: npm publish --access public

  pypi:
    name: "suiflex-suitest-lifecycle → PyPI"
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: uv build --project packages/lifecycle -o dist

      - name: Boot smoke via console script
        env:
          SUITEST_API_URL: http://127.0.0.1:41999
          SUITEST_API_KEY: sk_suitest_ci
        run: |
          # The server refuses to boot without valid credentials — run a whoami stub.
          python3 scripts/mcp_whoami_stub.py &
          for i in $(seq 1 50); do
            curl -sf -o /dev/null -H "Authorization: Bearer $SUITEST_API_KEY" \
              "$SUITEST_API_URL/api/v1/api-keys/whoami" && break
            sleep 0.1
          done
          printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{}}\n' \
            | uvx --from "$(ls dist/*.whl)" suitest-mcp \
            | python3 -c 'import sys, json; m = json.loads(sys.stdin.readline()); assert "suitest" in m["result"]["serverInfo"]["name"]; print("boot OK")'

      - name: Publish
        if: startsWith(github.ref, 'refs/tags/mcp-v')
        # --check-url skips files already on PyPI (lifecycle version may lag the mcp tag)
        run: uv publish --check-url https://pypi.org/simple/ dist/*
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
