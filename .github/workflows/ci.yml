name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-lint:
    name: Python lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-extras --dev --all-packages

      - name: Ruff check
        run: uv run ruff check apps packages

      - name: Ruff format check
        run: uv run ruff format --check apps packages

      - name: Mypy
        run: uv run mypy apps packages

  python-test:
    name: Python tests (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: suitest
          POSTGRES_PASSWORD: suitest
          POSTGRES_DB: suitest
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U suitest"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SUITEST_DATABASE_URL: postgresql+asyncpg://suitest:suitest@localhost:5432/suitest
      SUITEST_REDIS_URL: redis://localhost:6379/0
      SUITEST_AUTH_SECRET: ci-secret-32-characters-minimum-for-jwt
      SUITEST_ENCRYPTION_KEY: Y2ktZW5jcnlwdGlvbi1rZXktMzItYnl0ZS1iYXNlNjQ= # gitleaks:allow  pragma: allowlist secret -- CI dummy
      SUITEST_OAUTH_GOOGLE_CLIENT_ID: ci-client-id
      SUITEST_OAUTH_GOOGLE_CLIENT_SECRET: ci-client-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-extras --dev --all-packages

      - name: Run database migrations
        run: uv run alembic upgrade head
        working-directory: packages/db

      - name: Run pytest
        run: uv run pytest

  ts-lint:
    name: TypeScript lint (tsc + eslint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ${{ github.workspace }}

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

  ts-test:
    name: TypeScript tests (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ${{ github.workspace }}

      - name: Test
        run: pnpm test

  build-images:
    name: Build Docker images
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [python-lint, python-test, ts-lint, ts-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.runner
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.web
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
