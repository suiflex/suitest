name: release-images

# Build + push the platform container images to GHCR on an `images-v*` tag:
#   ghcr.io/suiflex/suitest-api
#   ghcr.io/suiflex/suitest-runner
#   ghcr.io/suiflex/suitest-web
#   ghcr.io/suiflex/suitest          (all-in-one)
#
# Each image is tagged <version> (from the tag) and latest, so
# `docker compose pull` gives users prebuilt images instead of a local
# build. On PRs touching the docker files, the build runs as validation
# without pushing.

on:
  push:
    tags: ["images-v*"]
  pull_request:
    paths:
      - "infra/docker/**"
      - ".github/workflows/release-images.yml"

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: "${{ matrix.image.ghcr }} → GHCR"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - ghcr: suitest-api
            dockerfile: infra/docker/Dockerfile.api
          - ghcr: suitest-runner
            dockerfile: infra/docker/Dockerfile.runner
          - ghcr: suitest-web
            dockerfile: infra/docker/Dockerfile.web
          - ghcr: suitest
            dockerfile: infra/docker/Dockerfile.suitest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/images-v')
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#images-v}" >> "$GITHUB_OUTPUT"

      - name: Build (and push on tag) ${{ matrix.image.ghcr }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: ${{ startsWith(github.ref, 'refs/tags/images-v') }}
          tags: |
            ghcr.io/suiflex/${{ matrix.image.ghcr }}:${{ steps.ver.outputs.version }}
            ghcr.io/suiflex/${{ matrix.image.ghcr }}:latest
          cache-from: type=gha,scope=${{ matrix.image.ghcr }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.ghcr }}
