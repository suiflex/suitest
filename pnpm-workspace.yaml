packages:
  - "apps/web"
  - "packages/mcp-npx"
  - "docs-site"
allowBuilds:
  esbuild: true
  msw: true
  sharp: true
onlyBuiltDependencies:
  - esbuild
  - sharp
  - msw
overrides:
  # Security floors (Dependabot): pin only the vulnerable ranges upward.
  "form-data@>=4.0.0 <4.0.6": "4.0.6"
  "js-yaml@>=4.0.0 <4.2.0": "4.2.0"
  "vite@>=6.0.0 <6.4.3": "6.4.3"
  "@babel/core@<7.29.6": "7.29.6"
  "uuid@>=9.0.0 <11.1.1": "11.1.1"
  "esbuild@<0.28.1": "0.28.1"
