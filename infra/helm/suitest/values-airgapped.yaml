# M4-4 air-gapped overlay: `helm install suitest ./infra/helm/suitest -f values-airgapped.yaml`
#
# Assumes every image has been pushed to an in-cluster / local registry (see
# scripts/airgapped-bundle.sh) and there is NO outbound internet. LOCAL tier is
# served by an in-cluster Ollama; NetworkPolicy denies all egress except DNS,
# intra-release pods, and the datastore CIDRs you list below.
image:
  # Point at your in-cluster registry mirror.
  registry: registry.internal:5000/suitest
  pullPolicy: IfNotPresent

suitest:
  tier: local

llm:
  enabled: true
  provider: ollama
  model: llama3.1
  # Resolves to the in-cluster Ollama Service.
  baseUrl: http://suitest-ollama:11434

embeddings:
  backend: fastembed
  model: BAAI/bge-small-en-v1.5
  dim: 384

ollama:
  enabled: true
  image: registry.internal:5000/ollama/ollama:0.3.12

# Lock down egress. Add your postgres/redis/s3 CIDRs so the only allowed
# outbound is to your own datastores — nothing reaches the public internet.
networkPolicy:
  enabled: true
  egressCidrs:
    - 10.0.0.0/8

autoscaling:
  enabled: true
