suitest:
  tier: zero
  autonomyDefault: manual

image:
  registry: ghcr.io/suitest-dev
  apiRepository: suitest-api
  runnerRepository: suitest-runner
  webRepository: suitest-web
  tag: "0.1.0"
  pullPolicy: IfNotPresent
  pullSecrets: []

llm:
  enabled: false
  provider: none
  model: ""
  baseUrl: ""
  apiKeySecretRef:
    name: ""
    key: api-key

embeddings:
  backend: none
  model: ""
  dim: 384

api:
  replicaCount: 2
  service:
    type: ClusterIP
    port: 4000
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

web:
  replicaCount: 2
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: suitest.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

postgres:
  external: true
  host: postgres
  port: 5432
  database: suitest
  userSecretRef:
    name: suitest-pg
    key: user
  passwordSecretRef:
    name: suitest-pg
    key: password

redis:
  external: true
  url: redis://redis:6379/0

s3:
  external: true
  endpoint: http://minio:9000
  bucket: suitest-artifacts

serviceAccount:
  create: true
  name: ""
  annotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

# M4-3: ARQ worker deployment (no Service — pulls jobs from Redis).
runner:
  replicaCount: 2
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi

# M4-3: HorizontalPodAutoscaler per component.
autoscaling:
  enabled: false
  api:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  web:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

# M4-3: PodDisruptionBudget (api/web/runner).
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# M4-3: default-deny NetworkPolicy + allowlist. egressCidrs should list the
# datastore CIDRs (postgres/redis/s3); ingressFromNamespaceLabels selects the
# ingress-controller namespace.
networkPolicy:
  enabled: false
  ingressFromNamespaceLabels:
    kubernetes.io/metadata.name: ingress-nginx
  egressCidrs: []
