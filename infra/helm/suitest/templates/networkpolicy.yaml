{{- if .Values.networkPolicy.enabled }}
# Default-deny ingress + egress for all Suitest pods, then explicitly allow:
#  - ingress between Suitest components + from the ingress controller namespace
#  - egress to DNS, intra-release pods, and the configured datastores
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "suitest.fullname" . }}-default-deny
  labels:
    {{- include "suitest.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "suitest.selectorLabels" . | nindent 6 }}
  policyTypes: ["Ingress", "Egress"]
  ingress:
    # intra-release traffic (api ↔ web ↔ runner)
    - from:
        - podSelector:
            matchLabels:
              {{- include "suitest.selectorLabels" . | nindent 14 }}
    {{- with .Values.networkPolicy.ingressFromNamespaceLabels }}
    - from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml . | nindent 14 }}
    {{- end }}
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # intra-release pods
    - to:
        - podSelector:
            matchLabels:
              {{- include "suitest.selectorLabels" . | nindent 14 }}
    {{- with .Values.networkPolicy.egressCidrs }}
    # datastores (postgres / redis / s3) + any allowlisted egress
    - to:
        {{- range . }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
    {{- end }}
{{- end }}
