{{- if .Values.ollama.enabled }}
# In-cluster Ollama for air-gapped LOCAL tier (M4-4). No outbound network needed
# once the model is baked into the image / PVC. The runner + api reach it at
# http://<release>-ollama:11434.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "suitest.fullname" . }}-ollama
  labels:
    {{- include "suitest.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "suitest.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ollama
  template:
    metadata:
      labels:
        {{- include "suitest.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ollama
    spec:
      containers:
        - name: ollama
          image: "{{ .Values.ollama.image }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 11434
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.ollama.resources | nindent 12 }}
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
      volumes:
        - name: models
          {{- if .Values.ollama.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "suitest.fullname" . }}-ollama
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "suitest.fullname" . }}-ollama
  labels:
    {{- include "suitest.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
spec:
  selector:
    {{- include "suitest.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
  ports:
    - port: 11434
      targetPort: http
      name: http
{{- if .Values.ollama.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "suitest.fullname" . }}-ollama
  labels:
    {{- include "suitest.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.ollama.persistence.size }}
{{- end }}
{{- end }}
