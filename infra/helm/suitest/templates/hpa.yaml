{{- if .Values.autoscaling.enabled }}
{{- range $c := list "api" "web" }}
{{- $cfg := index $.Values.autoscaling $c }}
{{- if $cfg.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "suitest.fullname" $ }}-{{ $c }}
  labels:
    {{- include "suitest.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $c }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "suitest.fullname" $ }}-{{ $c }}
  minReplicas: {{ $cfg.minReplicas }}
  maxReplicas: {{ $cfg.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $cfg.targetCPUUtilizationPercentage }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
{{- end }}
{{- end }}
{{- end }}
