name: suitest

x-suitest-env: &suitest-env
  # Infra URLs default to the in-compose services so `make demo` works with a
  # lean .env; secrets stay default-less on purpose (must come from .env).
  SUITEST_DATABASE_URL: ${SUITEST_DATABASE_URL:-postgresql+asyncpg://suitest:${POSTGRES_PASSWORD:-suitest}@postgres:5432/suitest}
  SUITEST_REDIS_URL: ${SUITEST_REDIS_URL:-redis://redis:6379/0}
  SUITEST_S3_ENDPOINT: ${SUITEST_S3_ENDPOINT:-http://minio:9000}
  SUITEST_S3_BUCKET: ${SUITEST_S3_BUCKET:-suitest}
  SUITEST_S3_ACCESS_KEY: ${SUITEST_S3_ACCESS_KEY:-minioadmin}
  SUITEST_S3_SECRET_KEY: ${SUITEST_S3_SECRET_KEY:-minioadmin}
  SUITEST_LLM_PROVIDER: ${SUITEST_LLM_PROVIDER:-}
  SUITEST_ENCRYPTION_KEY: ${SUITEST_ENCRYPTION_KEY}
  SUITEST_AUTH_SECRET: ${SUITEST_AUTH_SECRET}
  SUITEST_WEB_URL: ${SUITEST_WEB_URL:-http://localhost:3000}
  SUITEST_API_URL: ${SUITEST_API_URL:-http://localhost:4000}
  SUITEST_OAUTH_GOOGLE_CLIENT_ID: ${SUITEST_OAUTH_GOOGLE_CLIENT_ID:-}
  SUITEST_OAUTH_GOOGLE_CLIENT_SECRET: ${SUITEST_OAUTH_GOOGLE_CLIENT_SECRET:-}
  SUITEST_SUPERADMIN_EMAIL: ${SUITEST_SUPERADMIN_EMAIL:-maya@nusantararetail.local}
  SUITEST_SUPERADMIN_PASSWORD: ${SUITEST_SUPERADMIN_PASSWORD:-admin123}
services:
  postgres:
    image: pgvector/pgvector:pg16
    profiles: ["zero", "cloud", "local", "dev", "demo"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: suitest
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-suitest}
      POSTGRES_DB: suitest
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suitest -d suitest"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    profiles: ["zero", "cloud", "local", "dev", "demo"]
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    profiles: ["zero", "cloud", "local", "dev", "demo"]
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${SUITEST_S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${SUITEST_S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    profiles: ["zero", "cloud", "local", "dev", "demo"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${SUITEST_S3_ACCESS_KEY:-minioadmin} ${SUITEST_S3_SECRET_KEY:-minioadmin} &&
        mc mb --ignore-existing local/${SUITEST_S3_BUCKET:-suitest-artifacts} &&
        mc anonymous set download local/${SUITEST_S3_BUCKET:-suitest-artifacts} ||
        echo 'bucket init done';
      "
    restart: "no"

  migrate:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    profiles: ["zero", "cloud", "local", "dev", "demo"]
    environment: *suitest-env
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app/packages/db
    command: ["uv", "run", "--project", "/app", "alembic", "upgrade", "head"]
    restart: "no"

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    profiles: ["zero", "cloud", "local", "dev", "demo"]
    environment: *suitest-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5

  runner:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.runner
    profiles: ["zero", "cloud", "local", "dev", "demo"]
    environment: *suitest-env
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
      args:
        VITE_API_URL: ${SUITEST_API_URL}
    profiles: ["zero", "cloud", "local", "dev", "demo"]
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # 30-second demo (`make demo`): Brewly — tiny coffee-shop app the seeded
  # demo suite executes against. Fixture, not a product (examples/demo-app/).
  demo-app:
    build:
      context: ../../examples/demo-app
    profiles: ["demo"]
    restart: unless-stopped
    ports:
      - "8089:8089"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8089/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot seeder for the demo workspace (idempotent). Imports the committed
  # generation-output fixture examples/demo-app/suite.json so the demo replays
  # green at ZERO tier. Same image as the API.
  demo-seed:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    profiles: ["demo"]
    environment:
      <<: *suitest-env
      DEMO_APP_URL: http://demo-app:8089
      DEMO_SUITE_PATH: /demo/suite.json
    volumes:
      - ../../examples/demo-app:/demo:ro
    depends_on:
      api:
        condition: service_healthy
      demo-app:
        condition: service_healthy
    command: ["uv", "run", "--project", "/app", "python", "-m", "suitest_db.seed_demo"]
    restart: "no"

  # M4-1: in-cluster Ollama for the LOCAL tier. CPU-only (no GPU reservation) so
  # it boots on any host / CI runner. Activated by the ``local`` profile (the
  # LOCAL tier the Makefile advertises) and by ``local-smoke`` (the validation
  # harness that boots Ollama *alone* to smoke-test the provider plumbing via
  # scripts/validate_local_tier.py). Models live in a named volume so a pull
  # survives restarts.
  ollama:
    image: ollama/ollama:0.3.12
    profiles: ["local", "local-smoke"]
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 10

  # Pulls a tiny instruct model (~400 MB) once Ollama is healthy, then exits.
  # qwen2.5:0.5b is small enough to download + run on a CPU CI runner. Override
  # the model with SUITEST_LOCAL_SMOKE_MODEL.
  ollama-pull:
    image: ollama/ollama:0.3.12
    profiles: ["local", "local-smoke"]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "ollama pull ${SUITEST_LOCAL_SMOKE_MODEL:-qwen2.5:0.5b}"
    restart: "no"

  # E2E-only static page server. Serves tests/e2e/fixtures/test-page/index.html
  # so the M1c smoke (playwright-mcp Navigate → Screenshot → Click) has a
  # deterministic local target without depending on the public internet.
  # Activated only by the ``e2e`` profile so default ``docker compose up``
  # (zero/cloud/local/dev profiles) does not pull / start it.
  e2e-nginx:
    image: nginx:alpine
    profiles: ["e2e"]
    restart: "no"
    ports:
      - "8090:80"
    volumes:
      - ../../tests/e2e/fixtures/test-page:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
  miniodata:
  ollamadata:

networks:
  default:
    name: suitest
