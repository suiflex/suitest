name: suitest

x-suitest-env: &suitest-env
  SUITEST_DATABASE_URL: ${SUITEST_DATABASE_URL}
  SUITEST_REDIS_URL: ${SUITEST_REDIS_URL}
  SUITEST_S3_ENDPOINT: ${SUITEST_S3_ENDPOINT}
  SUITEST_S3_BUCKET: ${SUITEST_S3_BUCKET}
  SUITEST_S3_ACCESS_KEY: ${SUITEST_S3_ACCESS_KEY}
  SUITEST_S3_SECRET_KEY: ${SUITEST_S3_SECRET_KEY}
  SUITEST_LLM_PROVIDER: ${SUITEST_LLM_PROVIDER:-}
  SUITEST_ENCRYPTION_KEY: ${SUITEST_ENCRYPTION_KEY}
  SUITEST_AUTH_SECRET: ${SUITEST_AUTH_SECRET}
  SUITEST_WEB_URL: ${SUITEST_WEB_URL}
  SUITEST_API_URL: ${SUITEST_API_URL}
  SUITEST_OAUTH_GOOGLE_CLIENT_ID: ${SUITEST_OAUTH_GOOGLE_CLIENT_ID:-}
  SUITEST_OAUTH_GOOGLE_CLIENT_SECRET: ${SUITEST_OAUTH_GOOGLE_CLIENT_SECRET:-}

services:
  postgres:
    image: pgvector/pgvector:pg16
    profiles: ["zero", "cloud", "local", "dev"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: suitest
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-suitest}
      POSTGRES_DB: suitest
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suitest -d suitest"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    profiles: ["zero", "cloud", "local", "dev"]
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    profiles: ["zero", "cloud", "local", "dev"]
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${SUITEST_S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${SUITEST_S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    profiles: ["zero", "cloud", "local", "dev"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${SUITEST_S3_ACCESS_KEY:-minioadmin} ${SUITEST_S3_SECRET_KEY:-minioadmin} &&
        mc mb --ignore-existing local/${SUITEST_S3_BUCKET:-suitest-artifacts} &&
        mc anonymous set download local/${SUITEST_S3_BUCKET:-suitest-artifacts} ||
        echo 'bucket init done';
      "
    restart: "no"

  migrate:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    profiles: ["zero", "cloud", "local", "dev"]
    environment: *suitest-env
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app/packages/db
    command: ["uv", "run", "--project", "/app", "alembic", "upgrade", "head"]
    restart: "no"

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    profiles: ["zero", "cloud", "local", "dev"]
    environment: *suitest-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5

  runner:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.runner
    profiles: ["zero", "cloud", "local", "dev"]
    environment: *suitest-env
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
      args:
        VITE_API_URL: ${SUITEST_API_URL}
    profiles: ["zero", "cloud", "local", "dev"]
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # E2E-only static page server. Serves tests/e2e/fixtures/test-page/index.html
  # so the M1c smoke (playwright-mcp Navigate → Screenshot → Click) has a
  # deterministic local target without depending on the public internet.
  # Activated only by the ``e2e`` profile so default ``docker compose up``
  # (zero/cloud/local/dev profiles) does not pull / start it.
  e2e-nginx:
    image: nginx:alpine
    profiles: ["e2e"]
    restart: "no"
    ports:
      - "8090:80"
    volumes:
      - ../../tests/e2e/fixtures/test-page:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 5s
      timeout: 3s
      retries: 5

  # M4-11: optional Langfuse LLM-observability stack. Opt-in via the
  # ``observability`` profile (`docker compose --profile observability up`); the
  # default profiles never pull it. Point the API/runner at it with
  # OTEL/Langfuse env (see docs/DEPLOYMENT.md). Has its own Postgres so it never
  # shares the app DB.
  langfuse-db:
    image: postgres:16
    profiles: ["observability"]
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfusedata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 3s
      retries: 10

  langfuse:
    image: langfuse/langfuse:2
    profiles: ["observability"]
    depends_on:
      langfuse-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3030
      NEXTAUTH_SECRET: dev-langfuse-secret-change-me
      SALT: dev-langfuse-salt-change-me
      TELEMETRY_ENABLED: "false"
    ports:
      - "3030:3000"

volumes:
  pgdata:
  redisdata:
  miniodata:
  langfusedata:

networks:
  default:
    name: suitest
