default_language_version:
  python: python3.12
  node: "20"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--unsafe"]
        exclude: ^infra/helm/.*/templates/.*$
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Keep this version in sync with the ruff version uv resolves from
    # pyproject.toml's dev-dependencies (currently 0.15.x). The pre-commit
    # formatter and ``uv run ruff format --check`` (the CI gate) MUST agree on
    # multi-line assert layout, otherwise the hook will revert CI-formatted
    # code on each commit. See Issue C1 in the M1a review notes.
    rev: v0.15.14
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.9.0
          - pydantic-settings>=2.6.0
          - sqlalchemy>=2.0.36
          - fastapi>=0.115.0
          - uvicorn>=0.32.0
          - httpx>=0.27.0
          - asgi-lifespan>=2.1.0
          - pytest>=8.3.0
          - pytest-asyncio>=0.24.0
          - fastapi-users[sqlalchemy,oauth]>=14.0.0
          - fastapi-users-db-sqlalchemy>=7.0.0
          - httpx-oauth>=0.16.0
          - arq>=0.26.3
          - cryptography>=42
          - structlog>=24.4.0
          - opentelemetry-api>=1.29.0
          - opentelemetry-sdk>=1.29.0
          - opentelemetry-exporter-otlp-proto-http>=1.29.0
          - opentelemetry-instrumentation-fastapi>=0.50b0
          - opentelemetry-instrumentation-sqlalchemy>=0.50b0
          - opentelemetry-instrumentation-httpx>=0.50b0
          - opentelemetry-instrumentation-asyncpg>=0.50b0
          - prometheus-fastapi-instrumentator>=7.0.0
          - slowapi>=0.1.9
        args: ["--config-file=pyproject.toml"]
        files: ^(apps|packages)/.*\.py$
        # mirrors-mypy passes the staged files in a single invocation. With
        # pytest's importlib import mode there is no `tests/__init__.py`, so the
        # two per-package `conftest.py` files both resolve to the top-level
        # module `conftest`. If a commit stages both at once, mypy aborts with
        # "Duplicate module named conftest". Exclude packages/db/tests/conftest.py
        # from the per-file hook to keep that case from breaking; both conftests
        # are still fully type-checked by the authoritative `mypy apps`/`mypy
        # packages` split in CI (.github/workflows/ci.yml).
        exclude: ^(.*/alembic/versions/.*|packages/db/tests/conftest\.py)$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
